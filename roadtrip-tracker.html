<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 Dee & Ameya's Great American Roadtrip</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red: #e74c3c;
            --orange: #f39c12;
            --navy: #16213e;
            --dark-navy: #0f3460;
            --deep: #1a1a2e;
            --text: #eaeaea;
            --muted: rgba(234,234,234,0.55);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--deep);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── HEADER ─── */
        header {
            background: linear-gradient(120deg, #7b1113 0%, var(--red) 60%, #c0392b 100%);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-bottom: 3px solid #9b2335;
            z-index: 10;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-icon { font-size: 1.6rem; }
        .header-title { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.3px; }
        .header-sub { font-size: 0.72rem; opacity: 0.8; margin-top: 1px; letter-spacing: 0.5px; }
        .header-right { text-align: right; }
        .header-checkin { font-size: 0.9rem; font-weight: 600; color: #ffd9a0; }
        .header-checkin-label { font-size: 0.68rem; opacity: 0.7; margin-top: 1px; }
        .refresh-btn {
            background: rgba(255,255,255,0.15);
            border: none; color: white; cursor: pointer;
            padding: 5px 10px; border-radius: 6px; font-size: 0.75rem;
            margin-top: 4px; transition: background 0.2s;
        }
        .refresh-btn:hover { background: rgba(255,255,255,0.25); }

        /* ─── MAIN ─── */
        .main { display: flex; flex: 1; overflow: hidden; }

        /* ─── SIDEBAR ─── */
        .sidebar {
            width: 330px;
            min-width: 330px;
            background: var(--navy);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid var(--dark-navy);
        }

        /* Current location */
        .current-loc {
            padding: 16px 18px 14px;
            background: var(--dark-navy);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }
        .current-label {
            font-size: 0.67rem;
            text-transform: uppercase;
            letter-spacing: 1.8px;
            color: var(--muted);
            margin-bottom: 5px;
        }
        .current-city {
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--orange);
            line-height: 1.1;
        }
        .current-date { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--dark-navy);
            border-bottom: 1px solid var(--dark-navy);
            flex-shrink: 0;
        }
        .stat {
            background: var(--navy);
            padding: 12px 14px;
            text-align: center;
        }
        .stat-val {
            font-size: 1.7rem;
            font-weight: 800;
            color: var(--red);
            line-height: 1;
        }
        .stat-lbl {
            font-size: 0.67rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-top: 3px;
        }

        /* Journal */
        .journal-hdr {
            padding: 10px 18px 7px;
            font-size: 0.67rem;
            text-transform: uppercase;
            letter-spacing: 1.8px;
            color: var(--muted);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .journal-feed { flex: 1; overflow-y: auto; }
        .journal-feed::-webkit-scrollbar { width: 3px; }
        .journal-feed::-webkit-scrollbar-thumb { background: var(--dark-navy); border-radius: 2px; }

        .entry {
            padding: 11px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .entry:hover { background: rgba(255,255,255,0.04); }
        .entry.active {
            background: rgba(231,76,60,0.1);
            border-left: 3px solid var(--red);
            padding-left: 15px;
        }
        .entry-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .entry-loc { font-weight: 600; font-size: 0.92rem; }
        .entry-loc .state-badge {
            display: inline-block;
            font-size: 0.65rem;
            background: var(--red);
            color: white;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 5px;
            font-weight: 700;
            vertical-align: middle;
        }
        .entry-date { font-size: 0.72rem; color: var(--muted); white-space: nowrap; margin-left: 8px; }
        .entry-note { font-size: 0.83rem; color: rgba(234,234,234,0.75); line-height: 1.45; }
        .entry-photo { margin-top: 8px; border-radius: 6px; overflow: hidden; }
        .entry-photo img {
            width: 100%; max-height: 140px;
            object-fit: cover; border-radius: 6px; display: block;
        }
        .no-stops {
            padding: 32px 18px; text-align: center;
            color: var(--muted); font-size: 0.88rem; line-height: 1.6;
        }

        /* ─── MAP ─── */
        #map { flex: 1; }

        /* ─── LOADING ─── */
        .loader {
            position: fixed; inset: 0;
            background: var(--deep);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        .loader-car { font-size: 2.8rem; animation: vroom 1.2s ease-in-out infinite; }
        @keyframes vroom {
            0%,100% { transform: translateX(-8px) rotate(-2deg); }
            50% { transform: translateX(8px) rotate(2deg); }
        }
        .loader-title { font-size: 1.05rem; margin-top: 14px; font-weight: 600; }
        .loader-msg { font-size: 0.8rem; color: var(--muted); margin-top: 5px; }

        /* ─── SETUP MODAL ─── */
        .setup-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            z-index: 9998; padding: 20px;
        }
        .setup-box {
            background: var(--navy);
            border: 1px solid var(--dark-navy);
            border-radius: 12px;
            padding: 28px 32px;
            max-width: 560px; width: 100%;
            max-height: 90vh; overflow-y: auto;
        }
        .setup-box h2 { font-size: 1.2rem; margin-bottom: 6px; color: var(--orange); }
        .setup-box p { font-size: 0.88rem; color: var(--muted); line-height: 1.55; margin-bottom: 16px; }
        .setup-box ol { padding-left: 18px; }
        .setup-box li { font-size: 0.86rem; line-height: 1.6; margin-bottom: 6px; color: var(--text); }
        .setup-box code {
            background: var(--dark-navy); color: #7ec8e3;
            padding: 2px 6px; border-radius: 4px; font-size: 0.82rem;
        }
        .setup-box .sheet-cols {
            background: var(--dark-navy); border-radius: 8px;
            padding: 12px 16px; margin: 12px 0; font-size: 0.82rem;
        }
        .setup-box .sheet-cols th { color: var(--orange); font-weight: 600; padding: 2px 12px 6px 0; }
        .setup-box .sheet-cols td { color: var(--muted); padding: 2px 12px 2px 0; }
        .setup-note { font-size: 0.78rem; color: var(--muted); margin-top: 12px; }
    </style>
</head>
<body>

<!-- ═══════════════════════ LOADING ═══════════════════════ -->
<div class="loader" id="loader">
    <div class="loader-car">🚗</div>
    <div class="loader-title">Loading the adventure...</div>
    <div class="loader-msg" id="loaderMsg">Checking for updates</div>
</div>

<!-- ═══════════════════════ HEADER ═══════════════════════ -->
<header>
    <div class="header-left">
        <div class="header-icon">🗺️</div>
        <div>
            <div class="header-title">Dee &amp; Ameya's Great American Roadtrip</div>
            <div class="header-sub">Looping the mainland, one mile at a time 🛣️</div>
        </div>
    </div>
    <div class="header-right">
        <div class="header-checkin" id="headerCheckin">—</div>
        <div class="header-checkin-label">last check-in</div>
        <button class="refresh-btn" onclick="loadTrip()">↻ Refresh</button>
    </div>
</header>

<!-- ═══════════════════════ MAIN ═══════════════════════ -->
<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="current-loc">
            <div class="current-label">📍 Currently in</div>
            <div class="current-city" id="curCity">—</div>
            <div class="current-date" id="curDate"></div>
        </div>

        <div class="stats-grid">
            <div class="stat">
                <div class="stat-val" id="sDays">—</div>
                <div class="stat-lbl">🗓 Days rolling</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="sStates">—</div>
                <div class="stat-lbl">🗺 States hit</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="sMiles">—</div>
                <div class="stat-lbl">🛣 Miles covered</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="sStops">—</div>
                <div class="stat-lbl">📌 Stops made</div>
            </div>
        </div>

        <div class="journal-hdr">📖 Trip Journal</div>
        <div class="journal-feed" id="feed">
            <div class="no-stops">Trip journal will appear here<br>as stops are logged.</div>
        </div>
    </div>

    <!-- MAP -->
    <div id="map"></div>

</div>

<!-- ═══════════════════════ SCRIPTS ═══════════════════════ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  ✏️  EDIT THIS SECTION — your only config                ║
// ╚══════════════════════════════════════════════════════════╝
const CONFIG = {
    // Paste the published CSV URL from your Google Sheet here.
    // (See setup instructions — it looks like:
    //  https://docs.google.com/spreadsheets/d/YOUR_ID/pub?output=csv )
    SHEET_CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTI1E9F24PMyzw5jeMnvnPN9AEAhxJs5oLtWW-Jp-FamGOxWPgaLkszs7Rx2WrWF22zNeBV1wezvHUI/pub?output=csv',

    // When did the trip start? (YYYY-MM-DD)
    START_DATE: '2026-06-13',
};
// ╔══════════════════════════════════════════════════════════╗
// ║  That's it! Don't need to touch anything below           ║
// ╚══════════════════════════════════════════════════════════╝


// ─── Map setup ───────────────────────────────────────────────
const map = L.map('map', { center: [39.5, -98.35], zoom: 4 });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const makeStopIcon = (isCurrent) => L.divIcon({
    html: `<div style="
        width:${isCurrent?20:11}px; height:${isCurrent?20:11}px;
        background:${isCurrent?'#f39c12':'#e74c3c'};
        border:${isCurrent?3:2}px solid white; border-radius:50%;
        box-shadow:0 0 ${isCurrent?12:5}px ${isCurrent?'rgba(243,156,18,.9)':'rgba(231,76,60,.7)'};
        ${isCurrent?'animation:pulse 1.6s ease-in-out infinite;':''}
    "></div>
    ${isCurrent?`<style>@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:.75}}</style>`:''}`,
    className: '', iconSize: [isCurrent?20:11, isCurrent?20:11],
    iconAnchor: [isCurrent?10:5.5, isCurrent?10:5.5]
});

// ─── Geocoding (with localStorage cache) ─────────────────────
function getCache() {
    try { return JSON.parse(localStorage.getItem('rt_geocache') || '{}'); } catch { return {}; }
}
function setCache(c) {
    try { localStorage.setItem('rt_geocache', JSON.stringify(c)); } catch {}
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function geocode(city, state) {
    const key = `${city}|${state}`;
    const cache = getCache();
    if (cache[key]) return cache[key];

    await sleep(1150); // Nominatim rate limit: 1 req/sec
    try {
        const q = encodeURIComponent(`${city}, ${state}, USA`);
        const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`, {
            headers: { 'User-Agent': 'RoadtripTracker/1.0 (personal)' }
        });
        const d = await r.json();
        if (d.length) {
            const c = { lat: +d[0].lat, lng: +d[0].lon };
            cache[key] = c; setCache(cache);
            return c;
        }
    } catch {}
    return null;
}

// ─── Haversine distance (miles) ──────────────────────────────
function miles(lat1, lng1, lat2, lng2) {
    const R = 3958.8, toR = x => x * Math.PI / 180;
    const dLat = toR(lat2-lat1), dLng = toR(lng2-lng1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDate(s) {
    if (!s) return '';
    const d = new Date(s + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}

// ─── Track layers ─────────────────────────────────────────────
let mapMarkers = [], routeLayer = null;

function clearMap() {
    mapMarkers.forEach(m => map.removeLayer(m));
    mapMarkers = [];
    if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
}

// ─── Show setup instructions ─────────────────────────────────
function showSetup() {
    const el = document.createElement('div');
    el.className = 'setup-modal';
    el.innerHTML = `
    <div class="setup-box">
        <h2>🛠 Quick Setup — 3 steps</h2>
        <p>The tracker pulls live data from a Google Sheet. Here's how to wire it up:</p>

        <ol>
            <li><strong>Create a new Google Sheet</strong> and give it these exact column headers in row 1:</li>
        </ol>

        <div class="sheet-cols">
            <table><thead><tr>
                <th>A</th><th>B</th><th>C</th><th>D</th><th>E</th><th>F</th>
            </tr></thead><tbody><tr>
                <td>Date</td><td>City</td><td>State</td><td>Note</td><td>Photo URL</td><td>Miles</td>
            </tr></tbody></table>
            <p style="margin-top:8px; font-size:0.78rem; color:var(--muted);">
                • <strong>Date</strong>: YYYY-MM-DD &nbsp;|&nbsp; <strong>State</strong>: 2-letter abbrev (CA, TX…)<br>
                • <strong>Note</strong>: what's happening at this stop<br>
                • <strong>Photo URL</strong>: direct image link (Google Photos, Imgur, etc.) — optional<br>
                • <strong>Miles</strong>: from last stop — optional, auto-calculated if blank
            </p>
        </div>

        <ol start="2">
            <li>Go to <strong>File → Share → Publish to web</strong>. Select your sheet tab, choose <strong>Comma-separated values (.csv)</strong>, click Publish, and copy the URL.</li>
            <li>Open <code>roadtrip-tracker.html</code> in a text editor. Find the <code>CONFIG</code> section near the top and paste the URL as the value of <code>SHEET_CSV_URL</code>. Also update <code>START_DATE</code> to the trip start date.</li>
        </ol>

        <p class="setup-note">🔗 Share the HTML file with anyone (or host it on GitHub Pages, Netlify, etc.). Dee &amp; Ameya add rows to the Sheet to check in — the page fetches fresh data each time it loads.</p>

        <button onclick="this.closest('.setup-modal').remove()" style="
            margin-top:16px; background:var(--red); color:white; border:none;
            padding:9px 20px; border-radius:7px; cursor:pointer; font-size:0.9rem; font-weight:600;
        ">Got it! 🚗</button>
    </div>`;
    document.body.appendChild(el);
}

// ─── Main load function ───────────────────────────────────────
async function loadTrip() {
    const loader = document.getElementById('loader');
    const loaderMsg = document.getElementById('loaderMsg');
    loader.style.opacity = '1';
    loader.style.display = 'flex';
    loader.style.transition = 'none';

    if (CONFIG.SHEET_CSV_URL === 'YOUR_GOOGLE_SHEET_CSV_URL_HERE') {
        loaderMsg.textContent = 'Ready to set up!';
        await sleep(600);
        loader.style.transition = 'opacity 0.4s';
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none'; showSetup(); }, 400);
        return;
    }

    loaderMsg.textContent = 'Fetching latest updates…';

    let stops = [];
    try {
        const url = CONFIG.SHEET_CSV_URL + (CONFIG.SHEET_CSV_URL.includes('?') ? '&' : '?') + 'cachebust=' + Date.now();
        const res = await fetch(url);
        const text = await res.text();
        const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
        stops = parsed.data.filter(r => r.Date && r.City && r.State);
    } catch (e) {
        loaderMsg.textContent = '⚠️ Could not load sheet — check the URL in CONFIG.';
        await sleep(2500);
        loader.style.transition = 'opacity 0.4s';
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 400);
        return;
    }

    // Geocode stops
    const geocoded = [];
    for (let i = 0; i < stops.length; i++) {
        loaderMsg.textContent = `Mapping stop ${i+1}/${stops.length}: ${stops[i].City}, ${stops[i].State}`;
        const coords = await geocode(stops[i].City, stops[i].State);
        geocoded.push({ ...stops[i], coords });
    }

    const valid = geocoded.filter(s => s.coords);

    // ─ Build map ─
    clearMap();

    if (valid.length > 1) {
        const lls = valid.map(s => [s.coords.lat, s.coords.lng]);
        routeLayer = L.polyline(lls, {
            color: '#e74c3c', weight: 3, opacity: 0.85, dashArray: '7,5'
        }).addTo(map);
    }

    valid.forEach((stop, i) => {
        const isCur = i === valid.length - 1;
        const photo = stop['Photo URL'] ? `<br><img src="${stop['Photo URL']}" style="width:100%;max-width:220px;border-radius:5px;margin-top:8px;"/>` : '';
        const marker = L.marker([stop.coords.lat, stop.coords.lng], { icon: makeStopIcon(isCur) })
            .addTo(map)
            .bindPopup(`
                <div style="font-family:system-ui;min-width:160px;">
                    <strong style="font-size:1rem">${stop.City}, ${stop.State}</strong><br>
                    <span style="font-size:.82rem;opacity:.65">${fmtDate(stop.Date)}</span>
                    ${stop.Note ? `<p style="margin-top:6px;font-size:.88rem;line-height:1.45">${stop.Note}</p>` : ''}
                    ${photo}
                    ${isCur ? '<p style="margin-top:6px;color:#e67e22;font-weight:700">📍 Here now!</p>' : ''}
                </div>
            `);
        mapMarkers.push(marker);
    });

    if (valid.length) {
        const bounds = valid.map(s => [s.coords.lat, s.coords.lng]);
        map.fitBounds(bounds.length === 1
            ? [[bounds[0][0]-2, bounds[0][1]-2], [bounds[0][0]+2, bounds[0][1]+2]]
            : bounds,
            { padding: [40, 40] }
        );
    }

    // ─ Stats ─
    const latest = valid[valid.length - 1];
    document.getElementById('curCity').textContent = latest ? `${latest.City}, ${latest.State}` : '—';
    document.getElementById('curDate').textContent = latest ? fmtDate(latest.Date) : '';
    document.getElementById('headerCheckin').textContent = latest ? fmtDate(latest.Date) : '—';

    const tripStart = new Date(CONFIG.START_DATE);
    const today = new Date();
    const days = Math.max(1, Math.round((today - tripStart) / 86400000) + 1);
    document.getElementById('sDays').textContent = days;
    document.getElementById('sStates').textContent = new Set(valid.map(s => s.State)).size;
    document.getElementById('sStops').textContent = valid.length;

    let totalMiles = 0;
    for (let i = 1; i < valid.length; i++) {
        const manualMiles = parseFloat(valid[i].Miles);
        totalMiles += isNaN(manualMiles)
            ? miles(valid[i-1].coords.lat, valid[i-1].coords.lng, valid[i].coords.lat, valid[i].coords.lng)
            : manualMiles;
    }
    document.getElementById('sMiles').textContent = Math.round(totalMiles).toLocaleString();

    // ─ Journal (newest first) ─
    const feed = document.getElementById('feed');
    feed.innerHTML = '';
    if (valid.length === 0) {
        feed.innerHTML = '<div class="no-stops">No stops logged yet — check back soon! 🌅</div>';
    } else {
        [...valid].reverse().forEach((stop, idx) => {
            const isLatest = idx === 0;
            const div = document.createElement('div');
            div.className = 'entry' + (isLatest ? ' active' : '');
            div.innerHTML = `
                <div class="entry-hdr">
                    <div class="entry-loc">
                        ${stop.City}<span class="state-badge">${stop.State}</span>
                    </div>
                    <div class="entry-date">${fmtDate(stop.Date)}</div>
                </div>
                ${stop.Note ? `<div class="entry-note">${stop.Note}</div>` : ''}
                ${stop['Photo URL'] ? `<div class="entry-photo"><img src="${stop['Photo URL']}" loading="lazy" alt="${stop.City}" /></div>` : ''}
            `;
            const origIdx = valid.indexOf(stop);
            if (stop.coords) {
                div.addEventListener('click', () => {
                    map.flyTo([stop.coords.lat, stop.coords.lng], 9, { duration: 1.2 });
                    mapMarkers[origIdx]?.openPopup();
                    document.querySelectorAll('.entry').forEach(e => e.classList.remove('active'));
                    div.classList.add('active');
                });
            }
            feed.appendChild(div);
        });
    }

    // Hide loader
    loader.style.transition = 'opacity 0.5s';
    loader.style.opacity = '0';
    setTimeout(() => loader.style.display = 'none', 500);
}

loadTrip();
</script>
</body>
</html>
